dataset_id: paper_synthetic_v1
schema_version: "1.0"
seed: 42
n_cases: 60
period: FY2026-Q1
# Per-entity balances are varied deterministically (seeded) around these base
# values so that no two reporting entities are identical. See data/generator.py
# (_vary_balance). Sign discipline is enforced per account via balance_variation.
base_records:
  Revenue: 1000.0
  Expense: 620.0
  COGS: 410.0
  Operating Expense: 210.0
  Cash: 380.0
  Accounts Receivable: 140.0
  Accounts Payable: 95.0
balance_variation:
  enabled: true
  spread: 0.20          # +/- 20% per-entity variation
  # Accounts whose balances must never cross zero (sign discipline).
  non_negative:
    - Revenue
    - Expense
    - COGS
    - Operating Expense
    - Cash
    - Accounts Receivable
    - Accounts Payable
partition_ratio:
  baseline_validation: 0.4
  perturbation: 0.3
  governance_review: 0.2
  holdout_audit: 0.1
